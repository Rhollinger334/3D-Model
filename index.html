<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widowmaker 3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #sidebar {
      width: 300px;
      background: #16213e;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
    }
    #sidebar h1 {
      font-size: 1.2rem;
      color: #e94560;
      margin-bottom: 16px;
    }
    #sidebar h2 {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 16px 0 8px;
    }
    .model-btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: #0f3460;
      border: 1px solid #1a1a4e;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 0.85rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .model-btn:hover { background: #1a1a6e; border-color: #e94560; }
    .model-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .model-btn .size { font-size: 0.7rem; color: #888; display: block; margin-top: 2px; }
    .model-btn.active .size { color: #ffcdd2; }
    #viewer {
      flex: 1;
      position: relative;
    }
    #canvas { width: 100%; height: 100%; display: block; }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #888;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #info-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(22, 33, 62, 0.9);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.5;
    }
    #controls-hint {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(22, 33, 62, 0.9);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #888;
    }
    #measurements-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      background: #533483;
      border: none;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #measurements-btn:hover { background: #6a42a0; }
    #measurements-panel {
      display: none;
      margin-top: 10px;
      background: #0f3460;
      border-radius: 6px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.75rem;
      line-height: 1.6;
    }
    #measurements-panel .entry { padding: 2px 0; border-bottom: 1px solid #1a1a4e; }
    #measurements-panel .label { color: #888; }
    #measurements-panel .value { color: #e94560; float: right; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>Widowmaker 3D Viewer</h1>

    <h2>OW1 Models</h2>
    <button class="model-btn" data-model="models/OW1/Widowmaker_OW1_Textured_Default.glb">
      Default Skin (Textured)<span class="size">1.4 MB</span>
    </button>
    <button class="model-btn" data-model="models/OW1/Widowmaker_OW1_Textured_Noire.glb">
      Noire Skin (Textured)<span class="size">1.4 MB</span>
    </button>
    <button class="model-btn" data-model="models/OW1/Widowmaker_OW1_Full_Body.glb">
      Full Body + Weapon<span class="size">2.7 MB</span>
    </button>
    <button class="model-btn" data-model="models/OW1/Widowmaker_OW1_Body_Only.glb">
      Body Only<span class="size">509 KB</span>
    </button>
    <button class="model-btn" data-model="models/OW1/Widowmaker_OW1_Head_Only.glb">
      Head Only<span class="size">256 KB</span>
    </button>

    <h2>OW2 Talon</h2>
    <button class="model-btn" data-model="models/OW2_Talon/Widowmaker_Talon_Full.glb">
      Talon Full Body<span class="size">6.4 MB</span>
    </button>
    <button class="model-btn" data-model="models/OW2_Talon/Widowmaker_Talon_Head.glb">
      Talon Head<span class="size">4.4 MB</span>
    </button>

    <h2>OW2 Base</h2>
    <button class="model-btn" data-model="models/OW2/Widowmaker_Head_No_Helmet.glb">
      Head (No Helmet)<span class="size">471 KB</span>
    </button>

    <button id="measurements-btn">Show Measurements</button>
    <div id="measurements-panel"></div>
  </div>

  <div id="viewer">
    <canvas id="canvas"></canvas>
    <div id="loading" style="display:none;">
      <div class="spinner"></div>
      <div>Loading model...</div>
    </div>
    <div id="info-panel">Select a model from the sidebar to begin.</div>
    <div id="controls-hint">
      Drag: Rotate &bull; Scroll: Zoom &bull; Right-drag: Pan
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('canvas');
    const loadingEl = document.getElementById('loading');
    const infoPanel = document.getElementById('info-panel');

    // Renderer
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // Camera
    const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.01, 100);
    camera.position.set(0, 1.5, 3);

    // Controls
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 1, 0);
    controls.update();

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(3, 5, 3);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);

    // Grid
    const grid = new THREE.GridHelper(10, 20, 0x333366, 0x222244);
    scene.add(grid);

    // Loader
    const loader = new GLTFLoader();
    let currentModel = null;

    function loadModel(path) {
      loadingEl.style.display = 'block';
      if (currentModel) {
        scene.remove(currentModel);
        currentModel.traverse(child => {
          if (child.isMesh) {
            child.geometry.dispose();
            if (child.material.map) child.material.map.dispose();
            child.material.dispose();
          }
        });
      }

      loader.load(path, (gltf) => {
        currentModel = gltf.scene;
        scene.add(currentModel);

        // Center and fit model
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        currentModel.position.sub(center);
        currentModel.position.y += size.y / 2;

        controls.target.set(0, size.y / 2, 0);
        camera.position.set(0, size.y / 2, maxDim * 2);
        controls.update();

        // Info
        let meshCount = 0, vertexCount = 0;
        currentModel.traverse(child => {
          if (child.isMesh) {
            meshCount++;
            vertexCount += child.geometry.attributes.position.count;
          }
        });
        const fileName = path.split('/').pop();
        infoPanel.innerHTML = `<strong>${fileName}</strong><br>` +
          `Meshes: ${meshCount} &bull; Vertices: ${vertexCount.toLocaleString()}<br>` +
          `Size: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`;

        loadingEl.style.display = 'none';
      }, undefined, (err) => {
        loadingEl.style.display = 'none';
        infoPanel.textContent = 'Error loading model: ' + err.message;
      });
    }

    // Button handlers
    document.querySelectorAll('.model-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadModel(btn.dataset.model);
      });
    });

    // Measurements
    const measBtn = document.getElementById('measurements-btn');
    const measPanel = document.getElementById('measurements-panel');
    let measLoaded = false;

    measBtn.addEventListener('click', async () => {
      if (measPanel.style.display === 'block') {
        measPanel.style.display = 'none';
        measBtn.textContent = 'Show Measurements';
        return;
      }
      if (!measLoaded) {
        try {
          const res = await fetch('data/widowmaker_ULTIMATE_measurements.json');
          const data = await res.json();
          let html = '';
          const entries = typeof data === 'object' ? Object.entries(data) : [];
          for (const [key, val] of entries.slice(0, 200)) {
            const display = typeof val === 'object' ? JSON.stringify(val) : val;
            html += `<div class="entry"><span class="label">${key}</span><span class="value">${display}</span></div>`;
          }
          if (entries.length > 200) html += `<div class="entry" style="color:#888;text-align:center;">...and ${entries.length - 200} more</div>`;
          measPanel.innerHTML = html;
          measLoaded = true;
        } catch (e) {
          measPanel.innerHTML = '<div style="color:#e94560;">Failed to load measurements.</div>';
        }
      }
      measPanel.style.display = 'block';
      measBtn.textContent = 'Hide Measurements';
    });

    // Resize
    window.addEventListener('resize', () => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
